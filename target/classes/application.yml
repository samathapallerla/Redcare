spring:
  application:
    name: github-repo-scorer
  threads:
    virtual:
      enabled: true

github:
  base-url: https://api.github.com

resilience4j:
  circuit-breaker:
    instances:
      githubClient:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs